<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhisperX</title>
    <script>
      window.addEventListener('error', function(e) {
        if (e.message && e.message.includes('ResizeObserver loop')) {
          e.stopImmediatePropagation();
        }
      });
      const originalConsoleError = console.error;
      console.error = function(...args) {
        if (typeof args[0] === 'string' && args[0].includes('ResizeObserver')) return;
        originalConsoleError.apply(console, args);
      };
    </script>
    <!-- PDF.js for rendering PDF previews -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
      
      body {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      /* Technical Dot Grid Background */
      .bg-dot-grid {
        background-image: linear-gradient(rgba(0,216,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,216,255,0.03) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      /* Smooth scrolling for the whole app */
      html {
        scroll-behavior: smooth;
      }

      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: #09090b;
        color: #fafafa;
        font-family: 'Inter', sans-serif;
      }
      #root:empty::after {
        content: "Loading Application Engine...";
      }
    </style>
